seed: 42
device: auto
epochs: 30
mixed_precision: true
grad_clip_norm: 1.0
experiment:
  name: kaggle_effb4_30ep
  output_root: experiments
  log_every_n_steps: 20
loss:
  use_pos_weight: true
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
scheduler:
  name: cosine
  min_lr: 1.0e-06
  onecycle_pct_start: 0.3
checkpoint:
  monitor: val_f1
  mode: max
  early_stopping_patience: 5
  save_best_only: true
