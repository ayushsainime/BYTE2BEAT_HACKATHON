seed: 42

data:
  data_dir: "dataset_split"
  train_dir: "train"
  test_dir: "test"
  image_size: 320
  num_classes: 4

model:
  name: "densenet121"
  pretrained: true

train:
  batch_size: 16
  epochs: 40
  cv_folds: 5
  cv_epochs: 20
  lr: 0.0003
  warmup_epochs: 2
  weight_decay: 0.0001
  use_weighted_sampler: true
  freeze_backbone_epochs: 5
  backbone_lr: 0.00006
  val_split: 0.2
  num_workers: 2
  patience: 6

ensemble:
  models:
    - "densenet121"
    - "efficientnet_b3"
    - "convnext_tiny"
    - "resnet18"

eval:
  tta: true

logging:
  save_dir: "outputs"
  model_dir: "models"

runtime:
  required_versions:
    albumentations: ">=2.0.0,<3.0.0"
    opencv-python: ">=4.8.0,<5.0.0"
    torch: ">=2.2.0,<3.0.0"
    torchvision: ">=0.17.0,<1.0.0"
